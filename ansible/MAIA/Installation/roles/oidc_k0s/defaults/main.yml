---
# defaults file for oidc_k0s

# OIDC username claim (JWT claim to use as username)
oidc_username_claim: email

# OIDC groups claim (JWT claim to use for groups)
oidc_groups_claim: groups

# OIDC client ID
oidc_client_id: maia

# OIDC realm name (used in issuer URL)
oidc_realm: maia

# OIDC subdomain prefix (used in issuer URL: https://{{ oidc_subdomain }}.{{ cluster_domain }}/realms/{{ oidc_realm }})
oidc_subdomain: iam

# Path to CA certificate file for OIDC verification
# For k0s we typically use the cluster CA under the k0s data dir.
oidc_ca_file: /var/lib/k0s/pki/ca.crt

# Path to k0s etc directory
k0s_etc_dir: /etc/k0s

# Number of retries when waiting for k0s to become operational
oidc_k0s_retries: 10

# Delay in seconds between retries when waiting for k0s
oidc_k0s_retry_delay: 15


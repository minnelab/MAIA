---
# defaults file for oidc_k3s

# OIDC username claim (JWT claim to use as username)
oidc_username_claim: email

# OIDC groups claim (JWT claim to use for groups)
oidc_groups_claim: groups

# OIDC client ID
oidc_client_id: maia

# OIDC realm name (used in issuer URL)
oidc_realm: maia

# OIDC subdomain prefix (used in issuer URL: https://{{ oidc_subdomain }}.{{ cluster_domain }}/realms/{{ oidc_realm }})
oidc_subdomain: iam

# Path to CA certificate file for OIDC verification
# For k3s we typically use the server CA under the k3s data dir.
oidc_ca_file: /var/lib/rancher/k3s/server/tls/server-ca.crt

# Path to k3s config directory (config file is {{ k3s_config_dir }}/config.yaml)
k3s_config_dir: /etc/rancher/k3s

# Number of retries when waiting for k3s to become operational
oidc_k3s_retries: 10

# Delay in seconds between retries when waiting for k3s
oidc_k3s_retry_delay: 15

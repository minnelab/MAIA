---
# defaults file for ca

# Path to Kubernetes CA certificate file
# Default points to MicroK8s CA certificate location
kubernetes_ca_crt_path: /var/snap/microk8s/current/certs/ca.crt

# Path to Kubernetes CA private key file
# Default points to MicroK8s CA key location
kubernetes_ca_key_path: /var/snap/microk8s/current/certs/ca.key

# Namespace for cert-manager
cert_manager_namespace: cert-manager

# Name of the TLS secret to create in cert-manager namespace
kubernetes_ca_secret_name: kubernetes-ca

# Kubernetes kubectl command to use.
# Examples:
#   microk8s.kubectl
#   k0s kubectl
#   kubectl
kubernetes_kubectl_cmd: microk8s.kubectl

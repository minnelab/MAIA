galaxy_info:
  author: Simone Bendazzoli <simben@kth.se>
  description: Install and configure k0s, a lightweight Kubernetes distribution, on Ubuntu systems. Sets up a single-node k0s controller, configures kubeconfig, and sets up firewall rules.
  company: MAIA Project

  license: GPL-3.0-only

  min_ansible_version: 2.1

  galaxy_tags: [k0s, kubernetes, container, orchestration]

dependencies: []

argument_specs:
  main:
    description: Install and configure k0s, a lightweight Kubernetes distribution, on Ubuntu systems. Sets up a single-node k0s controller, configures kubeconfig, and sets up firewall rules.
    short_description: Install and configure k0s
    options:
      config_folder:
        type: str
        required: true
        description: "Path to the configuration folder containing env.json (required, provides DEPLOY_KUBECONFIG)"
      k0s_version:
        type: str
        required: false
        default: latest
        description: "k0s version to install (optional). The installer defaults to latest stable when 'latest' is used."
      k0s_firewall_ports:
        type: list
        required: false
        default: [{"port": 6443, "proto": "tcp"}, {"port": 80, "proto": "tcp"}, {"port": 443, "proto": "tcp"}]
        elements: dict
        description: "List of firewall ports to open for k0s (optional)"
      k0s_enable_port_forwarding:
        type: bool
        required: false
        default: true
        description: "Enable SSH port forwarding for API access (optional)"
      k0s_port_forward_port:
        type: int
        required: false
        default: 6443
        description: "Local port for SSH port forwarding to k0s API (optional)"
      k0s_data_dir:
        type: str
        required: false
        default: /var/lib/k0s
        description: "k0s data directory on the target host (optional)"
      rancher_local_path_provisioner_version:
        type: str
        required: false
        default: v0.0.34
        description: "Rancher local path provisioner version to install (optional)"


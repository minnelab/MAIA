{{- if .Values.maia_dashboard_values_dev }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .Release.Name }}-maia-dashboard-dev
  namespace: {{ .Values.argo_namespace }}
spec:
  project: {{ .Release.Name }}
  source:
    {{- if .Values.maia_dashboard_values_dev.chart_name }}
    chart: {{ .Values.maia_dashboard_values_dev.chart_name }}
    {{- end }}
    {{- if .Values.maia_dashboard_values_dev.path }}
    path: {{ .Values.maia_dashboard_values_dev.path }}
    {{- end }}
    repoURL: {{ .Values.maia_dashboard_values_dev.repo_url }}
    targetRevision: {{ .Values.maia_dashboard_values_dev.chart_version }}
    helm:
      releaseName: {{ .Release.Name }}-maia-dashboard-dev
      valuesObject:
      {{ .Values.maia_dashboard_values_dev | toYaml | nindent 8 }}
  destination:
    server: {{ .Values.dashboard_destination_server }}
    namespace: {{ .Values.maia_dashboard_values_dev.namespace }}
{{- end }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "maia-pacs-stack.nginxConfigMapName" . }}
  labels:
    {{- include "maia-pacs-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: nginx
data:
  docker-entrypoint.sh: |
{{ .Files.Get "files/nginx/docker-entrypoint.sh" | indent 4 }}
  default.conf.template: |
    server {
    	listen 80;

    	proxy_buffer_size          128k;
    	proxy_buffers              4 256k;
    	proxy_busy_buffers_size    256k;

    {{- if .Values.oauth2Proxy.enabled }}
    	location ${OAUTH2_PUBLIC_PATH}/ {
    		rewrite ^${OAUTH2_PUBLIC_PATH}/(.*)$ /oauth2/$1 break;
    		proxy_pass       http://{{ include "maia-pacs-stack.oauth2ProxyServiceHost" . }}:{{ .Values.oauth2Proxy.service.targetPort }};
    		proxy_set_header Host                    $host;
    		proxy_set_header X-Real-IP               $remote_addr;
    		proxy_set_header X-Scheme                $scheme;
    		proxy_set_header X-Auth-Request-Redirect $request_uri;
    	}

    	location ${OAUTH2_PUBLIC_PATH}/auth {
    		proxy_pass       http://{{ include "maia-pacs-stack.oauth2ProxyServiceHost" . }}:{{ .Values.oauth2Proxy.service.targetPort }}/oauth2/auth;
    		proxy_set_header Host             $host;
    		proxy_set_header X-Real-IP        $remote_addr;
    		proxy_set_header X-Scheme         $scheme;
    		proxy_set_header Content-Length   "";
    		proxy_pass_request_body           off;
    	}
    {{- end }}

    	location ${AI_ASSIST_PUBLIC_PATH}/ {
    		proxy_pass http://{{ include "maia-pacs-stack.maiaAgentServiceHost" . }}:{{ .Values.maiaAgent.service.targetPort }}/;
    		proxy_set_header Host $host;
    		proxy_set_header X-Real-IP $remote_addr;
    		proxy_http_version 1.1;
    		proxy_set_header Connection "";
    		proxy_buffering off;
    		proxy_read_timeout 3600s;
    		add_header 'Access-Control-Allow-Origin' '*' always;
    		add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
    		add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,Accept,Origin' always;
    		if ($request_method = 'OPTIONS') {
    			add_header 'Access-Control-Allow-Origin' '*';
    			add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE';
    			add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,Accept,Origin';
    			add_header 'Access-Control-Max-Age' 1728000;
    			add_header 'Content-Length' 0;
    			return 204;
    		}
    	}

    	location ${DICOMWEB_PUBLIC_PATH}/ {
    		proxy_pass http://{{ include "maia-pacs-stack.orthancUpstreamHost" . }}:{{ .Values.orthanc.service.targetPort }}/dicom-web/;
    		proxy_set_header Host $host;
    		proxy_request_buffering off;
    		proxy_max_temp_file_size 0;
    		client_max_body_size 0;

    		add_header 'Access-Control-Allow-Origin' '*' always;
    		add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
    		add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,Accept,Origin' always;
    		add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range,Content-Type' always;

    		if ($request_method = 'OPTIONS') {
    			add_header 'Access-Control-Allow-Origin' '*';
    			add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE';
    			add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,Accept,Origin';
    			add_header 'Access-Control-Max-Age' 1728000;
    			add_header 'Content-Type' 'text/plain; charset=utf-8';
    			add_header 'Content-Length' 0;
    			return 204;
    		}
    	}

    	location ~ ^/[^/]+\.(js|css|wasm|map)$ {
    		proxy_pass http://{{ include "maia-pacs-stack.ohifServiceHost" . }}:{{ .Values.service.targetPort }}$request_uri;
    		proxy_set_header Host $http_host;
    	}

    	location /ort/ {
    		proxy_pass http://{{ include "maia-pacs-stack.ohifServiceHost" . }}:{{ .Values.service.targetPort }}/ort/;
    		proxy_set_header Host $http_host;
    	}

    	location /dicom-microscopy-viewer/ {
    		proxy_pass http://{{ include "maia-pacs-stack.ohifServiceHost" . }}:{{ .Values.service.targetPort }}/dicom-microscopy-viewer/;
    		proxy_set_header Host $http_host;
    	}

    	location ${OHIF_PUBLIC_PATH} {
    		proxy_pass http://{{ include "maia-pacs-stack.ohifServiceHost" . }}:{{ .Values.service.targetPort }}/;
    		proxy_set_header Host $http_host;
    		proxy_request_buffering off;
    		proxy_max_temp_file_size 0;
    		client_max_body_size 0;
    	}

    	location ${ORTHANC_PUBLIC_PATH}/ {
    {{- if .Values.oauth2Proxy.enabled }}
    		auth_request ${OAUTH2_PUBLIC_PATH}/auth;
    		error_page 401 ${OAUTH2_PUBLIC_PATH}/sign_in;
    		auth_request_set $email  $upstream_http_x_auth_request_email;
    		proxy_set_header X-Forwarded-Email $email;
    {{- end }}
    		proxy_pass http://{{ include "maia-pacs-stack.orthancUpstreamHost" . }}:{{ .Values.orthanc.service.targetPort }}/;
    		proxy_request_buffering off;
    		proxy_max_temp_file_size 0;
    		proxy_set_header Host $host;
    		client_max_body_size 10240M;
    		proxy_set_header X-Real-IP $remote_addr;
    		add_header 'Access-Control-Allow-Origin' '*' always;
    		add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
    		add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,Accept,Origin' always;
    		add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range,Content-Type' always;

    		if ($request_method = 'OPTIONS') {
    			add_header 'Access-Control-Allow-Origin' '*';
    			add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE';
    			add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,Accept,Origin';
    			add_header 'Access-Control-Max-Age' 1728000;
    			add_header 'Content-Type' 'text/plain; charset=utf-8';
    			add_header 'Content-Length' 0;
    			return 204;
    		}
    	}
    }

{{- if .Values.oauth2Proxy.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "maia-pacs-stack.fullname" . }}-oauth2-proxy
  labels:
    {{- include "maia-pacs-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: oauth2-proxy
spec:
  type: {{ .Values.oauth2Proxy.service.type }}
  ports:
    - port: {{ .Values.oauth2Proxy.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "maia-pacs-stack.oauth2ProxySelectorLabels" . | nindent 4 }}
{{- end }}

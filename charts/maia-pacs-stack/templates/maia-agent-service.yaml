apiVersion: v1
kind: Service
metadata:
  name: {{ include "maia-pacs-stack.fullname" . }}-maia-agent
  labels:
    {{- include "maia-pacs-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: maia-agent
spec:
  type: {{ .Values.maiaAgent.service.type }}
  ports:
    - port: {{ .Values.maiaAgent.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "maia-pacs-stack.maiaAgentSelectorLabels" . | nindent 4 }}

{{- if .Values.oauth2Proxy.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "maia-pacs-stack.fullname" . }}-oauth2-proxy
  labels:
    {{- include "maia-pacs-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: oauth2-proxy
spec:
  replicas: {{ .Values.oauth2Proxy.replicaCount }}
  selector:
    matchLabels:
      {{- include "maia-pacs-stack.oauth2ProxySelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "maia-pacs-stack.oauth2ProxySelectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: oauth2-proxy
          image: "{{ .Values.oauth2Proxy.image.repository }}:{{ .Values.oauth2Proxy.image.tag }}"
          imagePullPolicy: {{ .Values.oauth2Proxy.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.oauth2Proxy.service.targetPort }}
              protocol: TCP
          env:
            - name: MAIA_PUBLIC_URL
              value: {{ .Values.maiaPaths.maiaPublicUrl | quote }}
            - name: OHIF_PUBLIC_PATH
              value: {{ .Values.maiaPaths.ohifPublicPath | quote }}
            - name: DICOMWEB_PUBLIC_PATH
              value: {{ .Values.maiaPaths.dicomwebPublicPath | quote }}
            - name: ORTHANC_PUBLIC_PATH
              value: {{ .Values.maiaPaths.orthancPublicPath | quote }}
            - name: OAUTH2_PUBLIC_PATH
              value: {{ .Values.maiaPaths.oauth2PublicPath | quote }}
            - name: AI_ASSIST_PUBLIC_PATH
              value: {{ .Values.maiaPaths.aiAssistPublicPath | quote }}
            - name: OAUTH2_PROXY_PROVIDER
              value: {{ .Values.oauth2Proxy.provider | quote }}
            - name: OAUTH2_PROXY_CLIENT_ID
              value: {{ .Values.oauth2Proxy.clientId | quote }}
            - name: OAUTH2_PROXY_HTTP_ADDRESS
              value: {{ .Values.oauth2Proxy.httpAddress | quote }}
            - name: OAUTH2_PROXY_OIDC_ISSUER_URL
              value: {{ .Values.oauth2Proxy.oidcIssuerUrl | quote }}
            - name: OAUTH2_PROXY_COOKIE_SECURE
              value: {{ .Values.oauth2Proxy.cookieSecure | quote }}
            - name: OAUTH2_PROXY_EMAIL_DOMAINS
              value: {{ .Values.oauth2Proxy.emailDomains | quote }}
            - name: OAUTH2_PROXY_REDIRECT_URL
              value: {{ include "maia-pacs-stack.oauth2ProxyRedirectUrl" . | quote }}
            {{- if .Values.oauth2Proxy.existingSecret }}
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.oauth2Proxy.existingSecret }}
                  key: client-secret
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.oauth2Proxy.existingSecret }}
                  key: cookie-secret
            {{- else }}
            - name: OAUTH2_PROXY_CLIENT_SECRET
              value: {{ .Values.oauth2Proxy.clientSecret | quote }}
            - name: OAUTH2_PROXY_COOKIE_SECRET
              value: {{ .Values.oauth2Proxy.cookieSecret | quote }}
            {{- end }}
          {{- with .Values.oauth2Proxy.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}

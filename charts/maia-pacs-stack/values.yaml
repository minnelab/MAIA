# Default values for maia-pacs-stack (OHIF).

replicaCount: 1

image:
  repository: ohif
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Mirrors docker-compose depends_on via initContainers (busybox nc TCP checks).
waitForDependencies:
  enabled: true
  image:
    repository: busybox
    tag: "1.36"
  resources: {}
  orthanc:
    waitForPostgres: true
  ohif:
    waitForOrthanc: true
  maiaAgent:
    waitForOrthanc: true
  nginx:
    waitForOrthanc: true
    waitForOhif: true
    waitForMaiaAgent: true

# Public path configuration (docker-compose x-maia-paths).
maiaPaths:
  maiaPublicUrl: http://localhost
  ohifPublicPath: /ohif-xyz/
  dicomwebPublicPath: /dicom-web-xyz
  orthancPublicPath: /orthanc-xyz
  oauth2PublicPath: /oauth2-xyz
  aiAssistPublicPath: /ai-api

# Orthanc (docker-compose orthanc service).
orthanc:
  replicaCount: 1
  image:
    repository: maia-orthanc
    tag: "2.0"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8042
    targetPort: 8042
    # In-cluster DNS; defaults to {release}-orthanc. Override for external Orthanc.
    host: ""
  config:
    # PostgreSQL host in orthancv2.0.json; defaults to {release}-postgres.
    postgresHost: ""
  # Orthanc-served /ohif-config.js (files/orthanc-ohif-config.js). Empty string = use maiaPaths.
  ohifConfigJs:
    routerBasename: ""
    wadoUriRoot: ""
    qidoRoot: ""
    wadoRoot: ""
  persistence:
    storage:
      enabled: true
      size: 50Gi
      storageClass: ""
      accessMode: ReadWriteOnce
    folderToIndex:
      # Name of an existing PVC to mount at /folder-to-index (omit to skip).
      existingClaim: ""
  env:
    registeredUsers: |
      {"demo": "demo"}
    name: "MAIA Orthanc"
    beforeStartupScript: "/etc/start.sh"
    verboseEnabled: "true"
    verboseStartup: "true"
    advancedStoragePluginEnabled: "true"
    wsiPluginEnabled: "true"
    dicomAet: "ORTHANC"
    stoneWebViewerPluginEnabled: "true"
    osimisWebViewer1PluginEnabled: "true"
    dicomWebPluginEnabled: "true"
    authenticationEnabled: "false"
    ohifPluginEnabled: "true"
    overwriteInstances: "true"
    dicomModalities: |
      {"pacs": ["PACS", "pacs", 4242]}
    dicomWebServers: |
      {"pacs": ["http://pacs:8042/dicom-web/"]}
    explorer2EnableOpenInOhifViewer3: "true"
  resources: {}

# Front nginx (docker-compose nginx service). Build image from docker/MAIA-Orthanc/nginx.
nginx:
  replicaCount: 1
  image:
    repository: maia-pacs-nginx
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80
    targetPort: 80
  upstreams:
    ohif: ""
    oauth2Proxy: ""
    orthanc: ""
    maiaAgent: ""
  resources: {}

# maia-agent (docker-compose maia-agent service).
maiaAgent:
  replicaCount: 1
  image:
    repository: maia-agent
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8000
    targetPort: 8000
  dicomweb:
    url: ""
    staticWado: "true"
    singlepart: bulkdata
    omitQuotationForMultipart: "true"
  ollama:
    # Prefer existingSecret with key api-key over inline apiKey.
    existingSecret: ""
    apiKey: ""
    baseUrl: https://maia-chat.app.cloud.cbh.kth.se/api/v1
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""
    accessMode: ReadWriteOnce
  resources: {}

service:
  type: ClusterIP
  port: 8080
  targetPort: 80

# Postgres (docker-compose postgres service) — Orthanc index database.
postgres:
  image:
    repository: postgres
    tag: "15"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 5432
    targetPort: 5432
    # DNS name for in-cluster clients (e.g. Orthanc). Defaults to {release}-postgres.
    host: ""
  auth:
    hostAuthMethod: trust
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""
    accessMode: ReadWriteOnce
  resources: {}

# oauth2-proxy (docker-compose oauth2-proxy service). Disabled by default.
oauth2Proxy:
  enabled: false
  replicaCount: 1
  image:
    repository: quay.io/oauth2-proxy/oauth2-proxy
    tag: v7.6.0
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 4180
    targetPort: 4180
  provider: oidc
  clientId: maia
  # Prefer existingSecret (keys: client-secret, cookie-secret) over inline values.
  existingSecret: ""
  clientSecret: ""
  oidcIssuerUrl: https://iam.cloud.cbh.kth.se/realms/cloud
  cookieSecret: ""
  cookieSecure: "false"
  emailDomains: "*"
  httpAddress: "0.0.0.0:4180"
  resources: {}

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}

podAnnotations: {}
podSecurityContext: {}
securityContext: {}

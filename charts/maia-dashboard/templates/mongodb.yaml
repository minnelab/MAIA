{{- if .Values.mongodb.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "maia-dashboard.fullname" . }}-mongodb
spec:
  selector:
    matchLabels:
      app: {{ include "maia-dashboard.fullname" . }}-mongodb
  template:
    metadata:
      labels:
        app: {{ include "maia-dashboard.fullname" . }}-mongodb
    spec:
      volumes:
      - name: mongo-data
        persistentVolumeClaim:
          claimName: {{ include "maia-dashboard.fullname" . }}-mongodb-pvc
      containers:
      - name: mongodb
        image: mongo:5.0
        volumeMounts:
        - mountPath: "/data/db"
          name: mongo-data
        resources:
          limits:
            memory: "512Mi"
            cpu: "500m"
        readinessProbe:
            tcpSocket:
              port: 27017
        livenessProbe:
            tcpSocket:
              port: 27017
        env:
          - name: "MONGO_INITDB_ROOT_USERNAME"
            valueFrom:
              configMapKeyRef:
                key: DB_USER
                name: mongoprops
                optional: false
          - name: "MONGO_INITDB_ROOT_PASSWORD"
            valueFrom:
              secretKeyRef:
                key: DB_PASSWORD
                name: mongosecrets
                optional: false
          - name: wiredTigerCacheSizeGB
            value: "0.25"
        ports:
        - containerPort: 27017
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mongoprops
data:
  DB_USER: {{ .Values.mongodb.user }}
  DB_HOST: {{ .Values.mongodb.host }}
  DB_PORT: "27017"
  DB_NAME: {{ .Values.mongodb.name }}
  
---
apiVersion: v1
kind: Secret
metadata:
  name: mongosecrets
type: Opaque
data:
  DB_PASSWORD: {{ .Values.mongodb.password | b64enc }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "maia-dashboard.fullname" . }}-mongodb-pvc
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.mongodb.storageClass }}
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "maia-dashboard.fullname" . }}-mongodb
spec:
  ports:
    - port: 27017
      targetPort: 27017
  selector:
    app: {{ include "maia-dashboard.fullname" . }}-mongodb
{{- end }}
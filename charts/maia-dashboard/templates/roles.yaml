apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: dashboard-default-binding
subjects:
- kind: ServiceAccount
  name: default
  namespace: maia-dashboard
roleRef:
  kind: ClusterRole
  name: dashboard-default-cluster-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: dashboard-default-cluster-role
rules:
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: [ "create"]
- apiGroups: ["rbac.authorization.k8s.io"]
  resources: ["rolebindings","roles"]
  verbs: [ "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dashboard-default-role
  namespace: argocd
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: [ "list", "create", "patch", "update","get","delete"]
- apiGroups: ["argoproj.io"]
  resources: ["appprojects", "applications"]
  verbs: ["list", "get", "create","patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dashboard-default-role-binding
  namespace: argocd
subjects:
- kind: ServiceAccount
  name: default
  namespace: maia-dashboard
roleRef:
  kind: Role
  name: dashboard-default-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cert-manager-ca-role
  namespace: cert-manager
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: [ "get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cert-manager-ca-role-binding
  namespace: cert-manager
subjects:
- kind: ServiceAccount
  name: default
  namespace: maia-dashboard
roleRef:
  kind: Role
  name: cert-manager-ca-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: maia-namespace-role
rules:
  - verbs:
      - list
      - create
      - patch
      - update
      - get
    apiGroups:
      - ''
    resources:
      - secrets
      - services
      - configmaps
      - namespaces
      - serviceaccounts
  - verbs:
    - list
    - get
    apiGroups:
      - kubeflow.org
    resources:
      - profiles
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["rolebindings"]
    verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
    
  # 2. Permission to BIND the specific Kubeflow ClusterRoles (This solves your 403 error)
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["clusterroles"]
    verbs: ["bind"]
    resourceNames: 
      - "kubeflow-admin"
      - "kubeflow-edit"
      - "kubeflow-view"

  # 3. Permission to create the ServiceAccounts
  - apiGroups: [""]
    resources: ["serviceaccounts"]
    verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]

  # 4. Permission to create the Istio AuthorizationPolicies
  - apiGroups: ["security.istio.io"]
    resources: ["authorizationpolicies"]
    verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: maia-namespace-role-binding
subjects:
- kind: ServiceAccount
  name: default
  namespace: maia-dashboard
roleRef:
  kind: ClusterRole
  name: maia-namespace-role
  apiGroup: rbac.authorization.k8s.io